<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Votación</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 20px auto; padding: 10px; }
    .campo-grupo { margin-bottom: 15px; }
    label { display: block; font-weight: bold; margin-bottom: 5px; }
    input[type="text"], select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    .tarjeta-candidato { border: 2px solid #ccc; padding: 15px; margin-bottom: 10px; border-radius: 8px; cursor: pointer; text-align: center; }
    .tarjeta-candidato.seleccionada { border-color: #0070f3; background-color: #f0f7ff; }
    button { width: 100%; padding: 12px; background: #0070f3; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }
    button:hover { background: #0051a8; }
  </style>
</head>
<body>

  <h2>Tarjetón Electoral</h2>

  <div class="campo-grupo">
    <label for="usuario_discord">Usuario de Discord:</label>
    <input type="text" id="usuario_discord" placeholder="Ej: usuario#0000 o nombre_usuario">
  </div>

  <div class="campo-grupo">
    <label for="region">Región:</label>
    <select id="region">
      <option value="" disabled selected>Selecciona tu región...</option>
      <option value="Valdena">Valdena</option>
      <option value="Iradia">Iradia</option>
      <option value="Otresa">Otresa</option>
      <option value="Arkastra">Arkastra</option>
      <option value="Simósie">Simósie</option>
      <option value="Cirsena">Cirsena</option>
      <option value="Austra">Austra</option>
      <option value="Luva">Luva</option>
    </select>
  </div>

  <div class="campo-grupo">
    <label for="ubicacion_voto">Desde donde vota:</label>
    <select id="ubicacion_voto">
      <option value="" disabled selected>Selecciona tu ubicación...</option>
      <option value="Interior">Interior</option>
      <option value="Exterior">Exterior</option>
    </select>
  </div>

  <h3>Candidatos</h3>
  <div id="candidatos-container">
    <div class="tarjeta-candidato" onclick="seleccionarCandidato('Magno Alejandro')">
      <h4>Magno Alejandro</h4>
      <p>LIBERTAD Y ORDEN (LO)</p>
    </div>
    <div class="tarjeta-candidato" onclick="seleccionarCandidato('Donald Trump')">
      <h4>Donald Trump</h4>
      <p>PARTIDO REPUBLICANO (PR)</p>
    </div>
  </div>

  <button onclick="enviarVoto()">Registrar Voto</button>

  <script>
    let opcionSeleccionada = "";

    function seleccionarCandidato(nombre) {
      document.querySelectorAll('.tarjeta-candidato').forEach(el => el.classList.remove('seleccionada'));
      opcionSeleccionada = nombre;
      event.currentTarget.classList.add('seleccionada');
    }

    async function enviarVoto() {
      const usuario = document.getElementById('usuario_discord').value.trim();
      const region = document.getElementById('region').value;
      const ubicacion = document.getElementById('ubicacion_voto').value;

      if (!usuario || !opcionSeleccionada || !region || !ubicacion) {
        alert("Por favor, completa todos los campos y selecciona un candidato.");
        return;
      }

      const respuesta = await fetch('/api/votar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          usuario_discord: usuario,
          opcion_marcada: opcionSeleccionada,
          tipo_eleccion: "Presidencial",
          region: region,
          ubicacion: ubicacion // Enviamos el nuevo parámetro a la API
        })
      });

      if (respuesta.ok) {
        alert("¡Voto registrado con éxito! Serás redirigido a la página de resultados.");
        window.location.href = "/api/resultados"; 
      } else {
        alert("Hubo un problema al procesar tu voto.");
      }
    }
  </script>
</body>
</html>
