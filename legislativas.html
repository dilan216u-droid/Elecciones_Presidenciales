<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjeta Electoral - Elecciones Legislativas Completas</title>
    <style>
        :root {
            --primary-color: #1a4f7c;
            --bg-color: #f0f2f5;
            --border-color: #444;
            --text-color: #222;
            --x-color: rgba(211, 47, 47, 0.85); /* Color rojo para la X de votación */
            --orange-alert: #FF6B00;
        }

        body {
            font-family: 'Arial Black', 'Arial', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Encabezado Legislativo */
        .header-legislativo {
            text-align: center;
            border: 3px solid var(--border-color);
            background: #fff;
            padding: 15px;
            width: 100%;
            max-width: 1100px;
            box-sizing: border-box;
            margin-bottom: 25px;
        }

        .header-legislativo h1 {
            margin: 0;
            font-size: 1.6rem;
            color: var(--primary-color);
            text-transform: uppercase;
        }

        .header-legislativo p {
            margin: 5px 0 0 0;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        /* Contenedor del Tarjetón */
        .tarjeton-legislativo {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1100px;
            box-sizing: border-box;
        }

        /* Casilla de un Partido */
        .casilla-partido {
            background: #fff;
            border: 3px solid var(--border-color);
            padding: 12px;
            display: flex;
            flex-direction: column;
            min-height: 220px;
        }

        /* Zona superior: Logo e identificación */
        .partido-top {
            display: flex;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 8px;
            margin-bottom: 10px;
        }

        .partido-logo-container {
            width: 70px;
            height: 70px;
            border: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: #fafafa;
            position: relative; 
        }

        .partido-logo-container img {
            width: 90%;
            height: 90%;
            object-fit: contain;
        }

        .partido-info {
            flex-grow: 1;
            padding-left: 10px;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .tipo-lista {
            font-size: 0.7rem;
            background: #e1e1e1;
            padding: 2px 4px;
            display: inline-block;
            margin-top: 4px;
            font-family: Arial, sans-serif;
        }

        /* Zona inferior: Cuadrícula de números para Voto Preferente */
        .grid-numeros {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            flex-grow: 1;
            align-content: start;
        }

        .voto-numero {
            border: 1px solid #777;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            background: #fff;
            user-select: none;
            aspect-ratio: 1;
            position: relative; 
        }

        .voto-numero:hover, .partido-logo-container:hover {
            background-color: #ffe699; 
            border-color: #000;
        }

        /* Casilla Voto en Blanco */
        .casilla-blanco {
            justify-content: center;
            align-items: center;
            cursor: pointer;
            background: #fafafa;
            border: 3px dashed var(--border-color);
            position: relative; 
        }

        .casilla-blanco:hover {
            background-color: #ffe699;
        }

        .blanco-txt {
            font-size: 1.4rem;
            text-transform: uppercase;
            text-align: center;
        }

        /* LÓGICA Y ESTILOS PARA LA EXIS (X) REALSITA */
        .seleccionado::before, .seleccionado::after {
            content: "";
            position: absolute;
            width: 4px;
            height: 100%;
            background-color: var(--x-color);
            top: 0;
            left: calc(50% - 2px);
            z-index: 10;
        }

        .seleccionado::before {
            transform: rotate(45deg);
        }

        .seleccionado::after {
            transform: rotate(-45deg);
        }

        /* Modificación para el recuadro del voto en blanco */
        .casilla-blanco.seleccionado::before, .casilla-blanco.seleccionado::after {
            height: 80%;
            top: 10%;
        }
    </style>
</head>
